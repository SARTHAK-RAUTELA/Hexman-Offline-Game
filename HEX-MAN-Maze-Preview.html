<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HEX-MAN — All 10 Maze Previews</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000811;
      color: #fff;
      font-family: monospace;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 10px;
      color: rgba(0, 255, 255, 0.4);
      letter-spacing: 3px;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .maze-card {
      background: rgba(0, 4, 12, 0.8);
      border: 1px solid rgba(0, 255, 255, 0.1);
      padding: 16px;
      border-radius: 4px;
    }

    .maze-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .level-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      opacity: 0.5;
    }

    .level-name {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 4px;
    }

    .level-dim {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
    }

    canvas {
      display: block;
      width: 100%;
      image-rendering: pixelated;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dot-count {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
      margin-top: 6px;
      text-align: right;
    }
  </style>
</head>

    const COLORS = ["#00ffff", "#00ff88", "#ffff00", "#ff8800", "#ff00ff", "#ff4444", "#aa44ff", "#ff6600", "#ff0088", "#ffffff"];
    const NAMES = ["SECTOR 1", "SECTOR 2", "SECTOR 3", "SECTOR 4", "SECTOR 5", "SECTOR 6", "SECTOR 7", "SECTOR 8", "SECTOR 9", "SECTOR 10"];

    function renderMaze(maze, color) {
      const rows = maze.length;
      const cols = maze.reduce((m, r) => Math.max(m, r.length), 0);
      const CELL = 10;
      const cvs = document.createElement('canvas');
      cvs.width = cols * CELL; cvs.height = rows * CELL;
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = '#000811'; ctx.fillRect(0, 0, cvs.width, cvs.height);
      for (let y = 0; y < rows; y++) {
        const row = (maze[y] || '').padEnd(cols, '#');
        for (let x = 0; x < cols; x++) {
          const ch = row[x]; const px = x * CELL, py = y * CELL;
          if (ch === '#') {
            ctx.fillStyle = color + '22'; ctx.fillRect(px, py, CELL, CELL);
            ctx.strokeStyle = color; ctx.lineWidth = 0.8;
            ctx.shadowBlur = 3; ctx.shadowColor = color;
            ctx.strokeRect(px + 0.5, py + 0.5, CELL - 1, CELL - 1); ctx.shadowBlur = 0;
          } else if (ch === '.') {
            ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.beginPath();
            ctx.arc(px + CELL / 2, py + CELL / 2, 1.3, 0, Math.PI * 2); ctx.fill();
          } else if (ch === 'o') {
            ctx.fillStyle = '#ff88ff'; ctx.shadowBlur = 8; ctx.shadowColor = '#ff00ff';
            ctx.beginPath(); ctx.arc(px + CELL / 2, py + CELL / 2, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
          } else if (ch === 'G') {
            ctx.fillStyle = '#220033'; ctx.fillRect(px, py, CELL, CELL);
            ctx.strokeStyle = '#550088'; ctx.lineWidth = 0.5; ctx.strokeRect(px, py, CELL, CELL);
          } else if (ch === 'T') {
            ctx.fillStyle = color + '44'; ctx.fillRect(px, py, CELL, CELL);
            ctx.fillStyle = color + '99'; ctx.fillRect(px, py + CELL * 0.3, CELL, CELL * 0.4);
          } else if (ch === 'P') {
            ctx.fillStyle = '#ffff00'; ctx.shadowBlur = 10; ctx.shadowColor = '#ffff00';
            ctx.beginPath(); ctx.arc(px + CELL / 2, py + CELL / 2, CELL * 0.44, 0.25 * Math.PI, (2 - 0.25) * Math.PI);
            ctx.lineTo(px + CELL / 2, py + CELL / 2); ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
          } else {
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(px, py, CELL, CELL);
          }
        }
      }
      return cvs;
    }

    const grid = document.getElementById('grid');
    MAZES.forEach((maze, i) => {
      const rows = maze.length; const cols = maze.reduce((m, r) => Math.max(m, r.length), 0);
      let dots = 0, powers = 0;
      maze.forEach(row => { dots += (row.match(/\./g) || []).length; powers += (row.match(/o/g) || []).length; });
      const card = document.createElement('div'); card.className = 'maze-card';
      card.style.borderColor = COLORS[i] + '33';
      const header = document.createElement('div'); header.className = 'maze-header';
      header.innerHTML = `<div><div class="level-num" style="color:${COLORS[i]}88">LEVEL ${i + 1} OF 10</div><div class="level-name" style="color:${COLORS[i]};text-shadow:0 0 12px ${COLORS[i]}">${NAMES[i]}</div></div><div class="level-dim">${cols}×${rows} TILES</div>`;
      const cvs = renderMaze(maze, COLORS[i]);
      const info = document.createElement('div'); info.className = 'dot-count';
      info.textContent = `${dots} DOTS · ${powers} POWER PELLETS`;
      card.appendChild(header); card.appendChild(cvs); card.appendChild(info);
      grid.appendChild(card);
    });
